<header class="sticky top-0 z-50 border-b border-slate-200 bg-white/90 backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-5">

    <!-- Logo / Name -->
    <a href="#" class="flex flex-col">
      <span class="text-xl font-semibold tracking-tight text-slate-900">
        Cameron Cogan
      </span>
      <span class="text-sm text-slate-500">
        {{ t.studentTitle }}
      </span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden items-center gap-8 md:flex">
      <a href="#about" 
         (click)="trackEvent('navigation', 'section_click', 'About')"
         class="text-sm font-medium text-slate-600 transition hover:text-emerald-600">{{ t.about }}</a>

      <a href="#projects" 
         (click)="trackEvent('navigation', 'section_click', 'Projects')"
         class="text-sm font-medium text-slate-600 transition hover:text-emerald-600">{{ t.projects }}</a>

      <a href="#experience" 
         (click)="trackEvent('navigation', 'section_click', 'Experience')"
         class="text-sm font-medium text-slate-600 transition hover:text-emerald-600">{{ t.experience }}</a>

      <a href="#contact" 
         (click)="trackEvent('navigation', 'section_click', 'Contact')"
         class="text-sm font-medium text-slate-600 transition hover:text-emerald-600">{{ t.contact }}</a>

      <a href="#cookie-policy"
      (click)="openCookiePolicy(); trackEvent('navigation', 'section_click', 'Cookies')"
      class="text-sm text-slate-500 hover:text-emerald-600 transition">
      {{ t.cookies }}
      </a>

      <!-- Language Switcher -->
      <div class="flex items-center gap-2 ml-4 text-sm font-medium">
        <button (click)="setLanguage('en')" 
                [class.text-emerald-600]="currentLang === 'en'"
                [class.text-slate-500]="currentLang !== 'en'"
                class="hover:text-emerald-600 transition">EN</button>
        <span class="text-slate-300">|</span>
        <button (click)="setLanguage('fr')" 
                [class.text-emerald-600]="currentLang === 'fr'"
                [class.text-slate-500]="currentLang !== 'fr'"
                class="hover:text-emerald-600 transition">FR</button>
        <span class="text-slate-300">|</span>
        <button (click)="setLanguage('de')" 
                [class.text-emerald-600]="currentLang === 'de'"
                [class.text-slate-500]="currentLang !== 'de'"
                class="hover:text-emerald-600 transition">DE</button>
      </div>
    </nav>

    <!-- Mobile Button -->
    <button
      (click)="toggleMenu()"
      class="rounded-lg p-2 text-slate-600 transition hover:bg-slate-100 md:hidden">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

  </div>
</header>

@if (isMenuOpen()) {

  <!-- Mobile Menu Overlay -->
  <div class="fixed inset-0 z-40 bg-black/30 backdrop-blur-sm md:hidden" (click)="toggleMenu()"></div>

  <!-- Mobile Menu Panel -->
  <div animate.enter="menu-bounce-enter" animate.leave="menu-bounce-leave"
       class="fixed right-0 top-0 z-50 h-full w-80 bg-white p-8 shadow-2xl md:hidden">

    <div class="flex items-center justify-between border-b border-slate-200 pb-5">
      <div>
        <h2 class="text-lg font-semibold text-slate-900">Cameron Cogan</h2>
        <p class="text-sm text-slate-500">{{ t.studentTitle }}</p>
      </div>

      <button (click)="toggleMenu()" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <nav class="mt-8 space-y-2">
      <a href="#about" 
         (click)="toggleMenu(); trackEvent('navigation', 'section_click', 'About')"
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">{{ t.about }}</a>

      <a href="#projects" 
         (click)="toggleMenu(); trackEvent('navigation', 'section_click', 'Projects')"
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">{{ t.projects }}</a>

      <a href="#experience" 
         (click)="toggleMenu(); trackEvent('navigation', 'section_click', 'Experience')"
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">{{ t.experience }}</a>

      <a href="#contact" 
         (click)="toggleMenu(); trackEvent('navigation', 'section_click', 'Contact')"
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">{{ t.contact }}</a>

      <a href="#cookie-policy" 
         (click)="toggleMenu(); trackEvent('navigation', 'section_click', 'Cookies')"
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">{{ t.cookies }}</a>

      <!-- Mobile Language Switcher -->
      <div class="flex items-center gap-4 px-4 pt-6 text-sm font-medium">
        <button (click)="setLanguage('en')" 
                [class.text-emerald-600]="currentLang === 'en'"
                [class.text-slate-500]="currentLang !== 'en'"
                class="hover:text-emerald-600 transition">EN</button>
        <button (click)="setLanguage('fr')" 
                [class.text-emerald-600]="currentLang === 'fr'"
                [class.text-slate-500]="currentLang !== 'fr'"
                class="hover:text-emerald-600 transition">FR</button>
        <button (click)="setLanguage('de')" 
                [class.text-emerald-600]="currentLang === 'de'"
                [class.text-slate-500]="currentLang !== 'de'"
                class="hover:text-emerald-600 transition">DE</button>
      </div>
    </nav>

  </div>
}
