<header class="sticky top-0 z-50 border-b border-slate-200 bg-white/90 backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-5">

    <!-- Logo / Name -->
    <a href="#" class="flex flex-col">
      <span class="text-xl font-semibold tracking-tight text-slate-900">
        Cameron Cogan
      </span>

      <span class="text-sm text-slate-500">
        Student in International Business Administration
      </span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden items-center gap-8 md:flex">
      <a href="#about" class="text-sm font-medium text-slate-600 transition hover:text-emerald-600">About</a>
      <a href="#projects" class="text-sm font-medium text-slate-600 transition hover:text-emerald-600">Projects</a>
      <a href="#experience" class="text-sm font-medium text-slate-600 transition hover:text-emerald-600">Experience</a>
      <a href="#contact" class="text-sm font-medium text-slate-600 transition hover:text-emerald-600">Contact</a>
    </nav>

    <!-- Mobile Button -->
    <button
      (click)="toggleMenu()"
      class="rounded-lg p-2 text-slate-600 transition hover:bg-slate-100 md:hidden"
    >
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

  </div>
</header>

@if (isMenuOpen()) {

  <!-- Mobile Menu Overlay -->
  <div class="fixed inset-0 z-40 bg-black/30 backdrop-blur-sm md:hidden" (click)="toggleMenu()"></div>

  <!-- Mobile Menu Panel -->
  <div animate.enter="menu-bounce-enter" animate.leave="menu-bounce-leave"
       class="fixed right-0 top-0 z-50 h-full w-80 bg-white p-8 shadow-2xl md:hidden">

    <div class="flex items-center justify-between border-b border-slate-200 pb-5">
      <div>
        <h2 class="text-lg font-semibold text-slate-900">Cameron Cogan</h2>
        <p class="text-sm text-slate-500">International Business Administration</p>
      </div>

      <button (click)="toggleMenu()" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <nav class="mt-8 space-y-2">
      <a href="#about" 
         (click)="toggleMenu()" 
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">
        About
      </a>

      <a href="#projects" 
         (click)="toggleMenu()" 
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">
        Projects
      </a>

      <a href="#experience" 
         (click)="toggleMenu()" 
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">
        Experience
      </a>

      <a href="#contact" 
         (click)="toggleMenu()" 
         class="block rounded-lg px-4 py-3 font-medium text-slate-700 transition hover:bg-slate-100 hover:text-emerald-600">
        Contact
      </a>
    </nav>

  </div>
}
